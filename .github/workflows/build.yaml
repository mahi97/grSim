name: Build
on:
  push:
    branches:
      - master
  pull_request:
permissions:
  contents: read
jobs:
  build-linux:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-20.04, ubuntu-22.04, ubuntu-24.04 ]
    steps:
      - uses: actions/checkout@v6
      - name: "Update dependencies"
        run: sudo apt-get update
      - name: "Install dependencies"
        run: sudo apt-get install -y build-essential cmake pkg-config qtbase5-dev libqt5opengl5-dev libgl1-mesa-dev libglu1-mesa-dev libprotobuf-dev protobuf-compiler libode-dev libboost-dev
      - name: "Build"
        run: make

  build-macos:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-14, macos-15 ]
    steps:
      - uses: actions/checkout@v6
      - name: "Install dependencies"
        run: brew tap robotology/formulae && brew install cmake pkg-config qt@5
      - name: "Build"
        run: |
          export PATH="/opt/homebrew/opt/qt@5/bin:$PATH"
          export LDFLAGS="-L/opt/homebrew/opt/qt@5/lib"
          export CPPFLAGS="-I/opt/homebrew/opt/qt@5/include"
          export PKG_CONFIG_PATH="/opt/homebrew/opt/qt@5/lib/pkgconfig"
          export CMAKE_PREFIX_PATH="/opt/homebrew/opt/qt@5"
          make

  build-windows:
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: lukka/get-cmake@latest

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache Qt5
        id: cache-qt
        uses: actions/cache@v4
        with:
          path: C:/Qt
          key: qt-5.15.2-win64-msvc2019-64

      - name: Install Qt5 via aqtinstall
        if: steps.cache-qt.outputs.cache-hit != 'true'
        run: |
          pip install aqtinstall
          python -m aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 --outputdir C:/Qt

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_ODE=ON "-DCMAKE_PREFIX_PATH=C:/Qt/5.15.2/msvc2019_64"

      - name: Build
        run: cmake --build build --config Release
